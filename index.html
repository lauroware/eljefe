<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EL JEFE — Impunidad Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #f5c518;
            --gold-dark: #c9a200;
            --red: #e03030;
            --red-dark: #a01818;
            --green: #22c55e;
            --blue-deep: #0a0f2e;
            --panel-bg: #0d1117;
            --card-bg: #161b22;
            --card-border: #30363d;
            --text-primary: #e6edf3;
            --text-muted: #7d8590;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            min-height: 100vh;
            background: var(--panel-bg);
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px),
                repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.03) 40px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Barlow Condensed', sans-serif;
            overflow-x: hidden;
            padding: 16px 12px 140px;
        }

        .game-wrapper {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* HEADER */
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }

        .game-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 38px;
            letter-spacing: 2px;
            color: var(--gold);
            text-shadow: 0 0 20px rgba(245,197,24,0.5), 3px 3px 0 var(--gold-dark);
            line-height: 1;
        }

        .game-subtitle {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--red);
            text-transform: uppercase;
        }

        .badge {
            background: var(--red);
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 1px;
            padding: 4px 10px;
            border-radius: 4px;
            line-height: 1.4;
        }

        /* CANVAS */
        .canvas-container {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(245,197,24,0.3);
            box-shadow: 0 0 0 1px rgba(245,197,24,0.1), 0 20px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #080d1a;
        }

        .canvas-corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.6;
        }
        .canvas-corner.tl { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
        .canvas-corner.tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
        .canvas-corner.bl { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; }
        .canvas-corner.br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

        /* STATS PANEL */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 8px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gold);
            opacity: 0.4;
        }

        .stat-card.active-shield::before { background: var(--red); opacity: 1; }
        .stat-card.active-shield { border-color: var(--red); animation: shield-pulse 0.8s infinite; }

        @keyframes shield-pulse {
            0%, 100% { box-shadow: none; }
            50% { box-shadow: 0 0 16px rgba(224,48,48,0.5); }
        }

        .stat-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            color: var(--text-primary);
            line-height: 1;
        }

        /* PROGRESS BAR */
        .progress-section {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 12px 14px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .progress-pct {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            color: var(--gold);
        }

        .progress-track {
            height: 10px;
            background: rgba(255,255,255,0.06);
            border-radius: 99px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold));
            border-radius: 99px;
            transition: width 0.4s ease;
            box-shadow: 0 0 8px rgba(245,197,24,0.6);
        }

        /* BOTTOM CONTROLS */
        .controls-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: center;
        }

        /* LEGEND */
        .legend {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 10px 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.3px;
        }

        .legend-dot {
            width: 10px; height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }
        .ld-green { background: #22c55e; border-radius: 50%; }
        .ld-gold { background: var(--gold); }
        .ld-red { background: var(--red); }
        .ld-blue { background: #3b82f6; border-radius: 50%; }

        /* RESTART BUTTON */
        .restart-btn {
            background: transparent;
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .restart-btn:hover, .restart-btn:active {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(245,197,24,0.06);
        }

        /* FLOATING D-PAD */
        .floating-controls {
            position: fixed;
            bottom: 24px;
            right: 20px;
            z-index: 1000;
            cursor: grab;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.7));
        }

        .dpad {
            display: grid;
            grid-template-areas: ". u ." "l c r" ". d .";
            gap: 4px;
        }

        .dpad-btn {
            width: 56px;
            height: 56px;
            background: #1a2035;
            border: 1px solid rgba(245,197,24,0.25);
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            transition: all 0.08s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .dpad-btn:active {
            background: rgba(245,197,24,0.15);
            border-color: var(--gold);
            transform: scale(0.9);
        }

        .dpad-btn[data-dir="up"] { grid-area: u; }
        .dpad-btn[data-dir="left"] { grid-area: l; }
        .dpad-btn[data-dir="right"] { grid-area: r; }
        .dpad-btn[data-dir="down"] { grid-area: d; }
        .dpad-center {
            grid-area: c;
            width: 56px; height: 56px;
            background: rgba(245,197,24,0.08);
            border: 1px solid rgba(245,197,24,0.12);
            border-radius: 10px;
        }

        /* VICTORY MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            animation: fadeIn 0.3s ease;
        }

        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--gold);
            border-radius: 16px;
            padding: 36px 32px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 0 60px rgba(245,197,24,0.2);
            animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }

        .modal-box .modal-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 2px;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(245,197,24,0.6);
            line-height: 1;
            margin-bottom: 6px;
        }

        .modal-box .modal-subtitle {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .modal-stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--card-border);
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .modal-stat:last-of-type { border-bottom: none; }
        .modal-stat span:last-child {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            color: var(--gold);
        }

        .modal-btn {
            margin-top: 20px;
            width: 100%;
            background: var(--gold);
            color: #0a0f2e;
            border: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 20px;
            letter-spacing: 2px;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn:hover { background: #ffe566; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px) scale(0.9); opacity: 0; } to { transform: none; opacity: 1; } }

        @media (max-width: 480px) {
            .game-title { font-size: 30px; }
            .dpad-btn { width: 50px; height: 50px; font-size: 18px; }
            .dpad-center { width: 50px; height: 50px; }
            .stats-panel { grid-template-columns: repeat(4, 1fr); gap: 6px; }
            .stat-value { font-size: 22px; }
        }

        @media (max-width: 380px) {
            .dpad-btn { width: 46px; height: 46px; font-size: 16px; }
            .dpad-center { width: 46px; height: 46px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">

    <div class="game-header">
        <div>
            <div class="game-title">EL JEFE</div>
            <div class="game-subtitle">Impunidad Edition</div>
        </div>
        <div class="badge">ARCADE</div>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="800" height="560"></canvas>
        <div class="canvas-corner tl"></div>
        <div class="canvas-corner tr"></div>
        <div class="canvas-corner bl"></div>
        <div class="canvas-corner br"></div>
    </div>

    <div class="stats-panel">
        <div class="stat-card">
            <div class="stat-label">Puntos</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">3%</div>
            <div class="stat-value" id="foodCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">U$S</div>
            <div class="stat-value" id="dollarCount">0</div>
        </div>
        <div class="stat-card" id="impunityCard">
            <div class="stat-label">Escudo</div>
            <div class="stat-value" id="impunityTimer">—</div>
        </div>
    </div>

    <div class="progress-section">
        <div class="progress-header">
            <span class="progress-label">Objetivo de Robo</span>
            <span class="progress-pct" id="progress">0%</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressBar" style="width:0%"></div>
        </div>
    </div>

    <div class="controls-row">
        <div class="legend">
            <div class="legend-item"><div class="legend-dot ld-green"></div>3% = +10pts</div>
            <div class="legend-item"><div class="legend-dot ld-gold"></div>U$S = +50pts</div>
            <div class="legend-item"><div class="legend-dot ld-red"></div>Escudo = invenc.</div>
            <div class="legend-item"><div class="legend-dot ld-blue"></div>Sos vos</div>
            <div class="legend-item" style="grid-column:span 2; color: #e03030">⚠ Evitá La Ley</div>
        </div>
        <button class="restart-btn" id="restartBtn">↺ Restart</button>
    </div>

</div>

<!-- FLOATING D-PAD -->
<div class="floating-controls" id="floatingControls">
    <div class="dpad">
        <button class="dpad-btn" data-dir="up">▲</button>
        <button class="dpad-btn" data-dir="left">◀</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn" data-dir="right">▶</button>
        <button class="dpad-btn" data-dir="down">▼</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const mw = canvas.parentElement.clientWidth - 4;
    canvas.style.width = mw + 'px';
    canvas.style.height = (mw * 560 / 800) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

const GS = 40;
const CX = canvas.width / GS;   // 20
const CY = canvas.height / GS;  // 14

// ── game state ──────────────────────────────────────
let player, items, police, dir, score, foodCount, dollarCount,
    impunityRemaining, progress, gameRunning, gameWin,
    moveCounter, policeCounter, particles, screenShake, hitEffect,
    lastTime;

const POLICE_SPAWN = 15;
const IMPUNITY_DUR = 220;
const MOVE_INTERVAL = 175;

// ── Particle ─────────────────────────────────────────
class Particle {
    constructor(x, y, color, label) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = Math.random() * -4 - 2;
        this.life = 1;
        this.color = color;
        this.label = label;
        this.sz = Math.random() * 2 + 1;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.18;
        this.life -= 0.025;
        return this.life > 0;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.life;
        if (this.label) {
            ctx.font = `bold ${Math.floor(this.sz * 7)}px 'Bebas Neue', sans-serif`;
            ctx.fillStyle = this.color;
            ctx.shadowColor = this.color;
            ctx.shadowBlur = 8;
            ctx.fillText(this.label, this.x, this.y);
        } else {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.sz * 2, this.sz * 2);
        }
        ctx.restore();
    }
}

function burst(x, y, color, label, n) {
    for (let i = 0; i < n; i++) particles.push(new Particle(x, y, color, label));
}

// ── Init ─────────────────────────────────────────────
function initGame() {
    player = { x: Math.floor(CX / 2), y: Math.floor(CY / 2) };
    dir = { x: 0, y: 0 };
    score = 0; foodCount = 0; dollarCount = 0;
    impunityRemaining = 0; progress = 0;
    moveCounter = 0; policeCounter = 0;
    police = null; gameRunning = true; gameWin = false;
    particles = []; screenShake = 0; hitEffect = 0;
    lastTime = 0;
    items = [];
    for (let i = 0; i < 10; i++) generateItem();
    updateHUD();
}

function generateItem() {
    const r = Math.random();
    const type = r < 0.18 ? 'impunity' : r < 0.40 ? 'dollar' : 'percent';
    let it, tries = 0;
    do {
        it = { x: Math.floor(Math.random() * CX), y: Math.floor(Math.random() * CY), type };
        tries++;
    } while (tries < 100 && (
        items.some(i => i.x === it.x && i.y === it.y) ||
        (police && police.x === it.x && police.y === it.y) ||
        (player.x === it.x && player.y === it.y)
    ));
    items.push(it);
}

function spawnPolice() {
    let p, t = 0;
    do {
        p = { x: Math.floor(Math.random() * CX), y: Math.floor(Math.random() * CY) };
        t++;
    } while (t < 50 && Math.abs(p.x - player.x) < 5 && Math.abs(p.y - player.y) < 5);
    police = p;
    policeCounter = 0;
    burst(p.x * GS + GS / 2, p.y * GS + GS / 2, '#e03030', null, 20);
}

function movePolice() {
    if (!police) return;
    const slow = impunityRemaining > 0 && Math.random() < 0.45;
    if (slow) return;
    const dx = police.x > player.x ? -1 : police.x < player.x ? 1 : 0;
    const dy = police.y > player.y ? -1 : police.y < player.y ? 1 : 0;
    if (Math.abs(police.x - player.x) >= Math.abs(police.y - player.y)) {
        police.x += dx;
    } else {
        police.y += dy;
    }
}

// ── Move & collision ──────────────────────────────────
function movePlayer() {
    if (!gameRunning) return;
    // wrap-around (Pac-Man style)
    let nx = (player.x + dir.x + CX) % CX;
    let ny = (player.y + dir.y + CY) % CY;
    player.x = nx;
    player.y = ny;

    moveCounter++;
    if (police) policeCounter++;
    if (impunityRemaining > 0) impunityRemaining--;

    // Police collision check (before moving police)
    if (police && player.x === police.x && player.y === police.y && impunityRemaining === 0) {
        triggerGameOver(); return;
    }

    // Item pickup
    const idx = items.findIndex(i => i.x === player.x && i.y === player.y);
    if (idx !== -1) {
        const it = items[idx];
        const px = player.x * GS + GS / 2, py = player.y * GS + GS / 2;
        screenShake = 4;
        if (it.type === 'percent') {
            foodCount++;
            progress = foodCount * 3;
            score += 10;
            burst(px, py, '#22c55e', '3%', 18);
        } else if (it.type === 'dollar') {
            dollarCount++;
            score += 50;
            burst(px, py, '#f5c518', 'U$S', 25);
        } else {
            impunityRemaining = IMPUNITY_DUR;
            score += 100;
            screenShake = 10;
            burst(px, py, '#e03030', '¡ESCUDO!', 30);
        }
        items.splice(idx, 1);
        generateItem();
        updateHUD();
    }

    // Spawn police
    if (!police && moveCounter >= POLICE_SPAWN) {
        spawnPolice();
        moveCounter = 0;
    }

    // Move police
    if (police) {
        movePolice();
        if (player.x === police.x && player.y === police.y && impunityRemaining === 0) {
            triggerGameOver(); return;
        }
        if (policeCounter >= 25) { police = null; policeCounter = 0; }
    }

    particles = particles.filter(p => p.update());

    if (progress >= 100) showVictory();
}

function triggerGameOver() {
    gameRunning = false;
    hitEffect = 40;
    screenShake = 15;
}

// ── HUD ───────────────────────────────────────────────
function updateHUD() {
    document.getElementById('score').textContent = Math.floor(score);
    document.getElementById('foodCount').textContent = foodCount;
    document.getElementById('dollarCount').textContent = dollarCount;
    document.getElementById('progress').textContent = `${Math.min(progress, 100).toFixed(1)}%`;
    document.getElementById('progressBar').style.width = `${Math.min(progress, 100)}%`;

    const ic = document.getElementById('impunityCard');
    const it = document.getElementById('impunityTimer');
    if (impunityRemaining > 0) {
        it.textContent = Math.ceil(impunityRemaining / 10);
        ic.classList.add('active-shield');
    } else {
        it.textContent = '—';
        ic.classList.remove('active-shield');
    }
}

// ── Drawing helpers ───────────────────────────────────

// Draw checkerboard-ish game bg
function drawBg() {
    ctx.fillStyle = '#080d1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.025)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= CX; i++) {
        ctx.beginPath(); ctx.moveTo(i * GS, 0); ctx.lineTo(i * GS, canvas.height); ctx.stroke();
    }
    for (let j = 0; j <= CY; j++) {
        ctx.beginPath(); ctx.moveTo(0, j * GS); ctx.lineTo(canvas.width, j * GS); ctx.stroke();
    }
}

// Percent pill
function drawPercent(x, y) {
    const cx = x * GS + GS / 2, cy = y * GS + GS / 2, r = GS / 2 - 4;
    ctx.save();
    const g = ctx.createRadialGradient(cx - 3, cy - 3, 1, cx, cy, r);
    g.addColorStop(0, '#4ade80'); g.addColorStop(1, '#16a34a');
    ctx.fillStyle = g;
    ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.floor(GS * 0.38)}px 'Bebas Neue', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('3%', cx, cy);
    ctx.restore();
}

// Dollar bill
function drawDollar(x, y) {
    const bx = x * GS + 3, by = y * GS + 7, bw = GS - 6, bh = GS - 14;
    ctx.save();
    const g = ctx.createLinearGradient(bx, by, bx + bw, by + bh);
    g.addColorStop(0, '#78350f'); g.addColorStop(0.3, '#f5c518'); g.addColorStop(1, '#ca8a04');
    ctx.fillStyle = g;
    ctx.shadowColor = '#f5c518'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw, bh, 3);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#0a0f2e';
    ctx.font = `bold ${Math.floor(GS * 0.3)}px 'Bebas Neue', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('U$S', bx + bw / 2, by + bh / 2);
    ctx.restore();
}

// Shield
function drawImpunity(x, y) {
    const cx = x * GS + GS / 2, cy = y * GS + GS / 2, r = GS / 2 - 3;
    const t = Date.now() / 600;
    ctx.save();
    const g = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
    g.addColorStop(0, '#ef4444'); g.addColorStop(1, '#dc2626');
    ctx.fillStyle = g;
    ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 14 + 6 * Math.sin(t);
    // shield shape
    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.bezierCurveTo(cx + r, cy - r, cx + r, cy + r * 0.4, cx, cy + r);
    ctx.bezierCurveTo(cx - r, cy + r * 0.4, cx - r, cy - r, cx, cy - r);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.floor(GS * 0.35)}px 'Barlow Condensed', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('IMP', cx, cy);
    ctx.restore();
}

// Player — politician with tie, blonde hair, suit
function drawPlayer(px, py) {
    const x = px * GS, y = py * GS, s = GS;
    ctx.save();

    // impunity glow ring
    if (impunityRemaining > 0) {
        const t = Date.now() / 300;
        ctx.beginPath();
        ctx.arc(x + s / 2, y + s / 2, s / 1.4, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${(t * 40) % 360},100%,60%,0.7)`;
        ctx.lineWidth = 3;
        ctx.shadowColor = 'white'; ctx.shadowBlur = 8;
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // Body / suit (navy)
    ctx.fillStyle = '#1e3a6e';
    ctx.beginPath(); ctx.roundRect(x + 4, y + s * 0.55, s - 8, s * 0.5, [2, 2, 6, 6]); ctx.fill();

    // Tie (red)
    ctx.fillStyle = '#dc2626';
    ctx.beginPath();
    ctx.moveTo(x + s / 2 - 2, y + s * 0.55);
    ctx.lineTo(x + s / 2 + 2, y + s * 0.55);
    ctx.lineTo(x + s / 2 + 3, y + s * 0.8);
    ctx.lineTo(x + s / 2, y + s * 0.85);
    ctx.lineTo(x + s / 2 - 3, y + s * 0.8);
    ctx.closePath(); ctx.fill();

    // Face
    const fg = ctx.createRadialGradient(x + s * 0.42, y + s * 0.28, 2, x + s / 2, y + s * 0.35, s * 0.28);
    fg.addColorStop(0, '#ffe4c4'); fg.addColorStop(1, '#f0c89c');
    ctx.fillStyle = fg;
    ctx.beginPath(); ctx.ellipse(x + s / 2, y + s * 0.35, s * 0.27, s * 0.28, 0, 0, Math.PI * 2); ctx.fill();

    // Hair (golden/blonde) — swept back
    ctx.fillStyle = '#d4a017';
    ctx.beginPath();
    ctx.ellipse(x + s / 2, y + s * 0.17, s * 0.3, s * 0.18, -0.2, 0, Math.PI * 2);
    ctx.fill();
    // front tuft
    ctx.beginPath();
    ctx.ellipse(x + s * 0.38, y + s * 0.12, s * 0.18, s * 0.1, 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#1e293b';
    ctx.beginPath(); ctx.ellipse(x + s * 0.41, y + s * 0.33, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + s * 0.59, y + s * 0.33, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    // eye shine
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(x + s * 0.42, y + s * 0.32, 1, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + s * 0.60, y + s * 0.32, 1, 0, Math.PI * 2); ctx.fill();

    // Smile (smug)
    ctx.beginPath();
    ctx.arc(x + s / 2, y + s * 0.42, s * 0.1, 0.2, Math.PI - 0.2);
    ctx.strokeStyle = '#8b5c2a'; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.restore();
}

// La Ley — police officer, dark uniform, cap, badge
function drawLey(px, py) {
    const x = px * GS, y = py * GS, s = GS;
    ctx.save();
    ctx.shadowColor = '#3b82f6'; ctx.shadowBlur = 12;

    // Body — dark blue uniform
    ctx.fillStyle = '#1e3050';
    ctx.beginPath(); ctx.roundRect(x + 4, y + s * 0.55, s - 8, s * 0.5, [2, 2, 6, 6]); ctx.fill();

    // Badge
    ctx.fillStyle = '#f5c518';
    ctx.beginPath(); ctx.arc(x + s * 0.38, y + s * 0.66, 3, 0, Math.PI * 2); ctx.fill();

    // Face
    ctx.fillStyle = '#f0c89c';
    ctx.beginPath(); ctx.ellipse(x + s / 2, y + s * 0.38, s * 0.25, s * 0.26, 0, 0, Math.PI * 2); ctx.fill();

    // Cap (dark blue with brim)
    ctx.fillStyle = '#0f1f40';
    ctx.beginPath(); ctx.ellipse(x + s / 2, y + s * 0.18, s * 0.3, s * 0.13, 0, 0, Math.PI * 2); ctx.fill();
    // brim
    ctx.fillStyle = '#0a1530';
    ctx.beginPath(); ctx.ellipse(x + s / 2, y + s * 0.23, s * 0.35, s * 0.07, 0, 0, Math.PI); ctx.fill();
    // cap top stripe
    ctx.fillStyle = '#f5c518';
    ctx.fillRect(x + s * 0.22, y + s * 0.16, s * 0.56, 2);

    // Eyes — stern
    ctx.fillStyle = '#1e293b';
    ctx.beginPath(); ctx.ellipse(x + s * 0.41, y + s * 0.36, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x + s * 0.59, y + s * 0.36, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    // brows
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x + s * 0.37, y + s * 0.30); ctx.lineTo(x + s * 0.46, y + s * 0.31); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x + s * 0.54, y + s * 0.31); ctx.lineTo(x + s * 0.63, y + s * 0.30); ctx.stroke();

    // Stern mouth
    ctx.beginPath();
    ctx.moveTo(x + s * 0.42, y + s * 0.46);
    ctx.lineTo(x + s * 0.58, y + s * 0.46);
    ctx.strokeStyle = '#7a4f2a'; ctx.lineWidth = 1.5; ctx.stroke();

    // "LA LEY" label under cap
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'white';
    ctx.font = `bold ${Math.floor(s * 0.18)}px 'Bebas Neue', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('LA LEY', x + s / 2, y + s * 0.91);

    ctx.restore();
}

// ── Main draw ─────────────────────────────────────────
function draw() {
    ctx.save();
    if (screenShake > 0) {
        ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
        screenShake = Math.max(0, screenShake - 1);
    }

    drawBg();
    items.forEach(it => {
        if (it.type === 'percent') drawPercent(it.x, it.y);
        else if (it.type === 'dollar') drawDollar(it.x, it.y);
        else drawImpunity(it.x, it.y);
    });
    if (police) drawLey(police.x, police.y);
    drawPlayer(player.x, player.y);
    particles.forEach(p => p.draw());

    if (hitEffect > 0) {
        ctx.fillStyle = `rgba(224,48,48,${hitEffect / 40 * 0.55})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        hitEffect--;
    }

    if (!gameRunning && !gameWin) drawGameOverScreen();
    ctx.restore();
}

function drawGameOverScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.82)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.textAlign = 'center';
    ctx.shadowColor = '#e03030'; ctx.shadowBlur = 30;
    ctx.fillStyle = '#e03030';
    ctx.font = `bold 62px 'Bebas Neue', sans-serif`;
    ctx.letterSpacing = '4px';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 40);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#f5c518';
    ctx.font = `bold 24px 'Bebas Neue', sans-serif`;
    ctx.fillText(`Puntaje: ${Math.floor(score)}   ·   Progreso: ${progress.toFixed(1)}%`, canvas.width / 2, canvas.height / 2 + 20);

    ctx.fillStyle = '#7d8590';
    ctx.font = `500 16px 'Barlow Condensed', sans-serif`;
    ctx.fillText('Presioná RESTART para intentar de nuevo', canvas.width / 2, canvas.height / 2 + 65);
    ctx.restore();
}

function showVictory() {
    gameRunning = false;
    gameWin = true;

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
        <div class="modal-box">
            <div class="modal-title">¡MISIÓN CUMPLIDA!</div>
            <div class="modal-subtitle">Conseguiste asilo en Medio Oriente 🕌</div>
            <div class="modal-stat"><span>Puntaje final</span><span>${Math.floor(score)}</span></div>
            <div class="modal-stat"><span>3% recolectados</span><span>${foodCount}</span></div>
            <div class="modal-stat"><span>Dólares alzados</span><span>${dollarCount}</span></div>
            <button class="modal-btn" id="victoryRestart">JUGAR DE NUEVO</button>
        </div>
    `;
    document.body.appendChild(overlay);
    document.getElementById('victoryRestart').addEventListener('click', () => {
        overlay.remove();
        startFresh();
    });
}

function startFresh() {
    initGame();
    gameRunning = true;
    gameWin = false;
    lastTime = 0;
    dir = { x: 0, y: 0 };
    particles = [];
}

// ── Game loop ─────────────────────────────────────────
function gameLoop(now) {
    if (!lastTime) lastTime = now;
    const dt = now - lastTime;
    if (dt >= MOVE_INTERVAL && gameRunning && !gameWin) {
        movePlayer();
        updateHUD();
        lastTime = now;
    }
    draw();
    requestAnimationFrame(gameLoop);
}

// ── Controls ──────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (!gameRunning || gameWin) return;
    const m = { ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0] };
    if (m[e.key]) {
        const [dx, dy] = m[e.key];
        if (dx === 0 || dir.y === 0) dir = { x: dx, y: dy };
        e.preventDefault();
    }
});

window.addEventListener('keydown', e => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});

function setDir(d) {
    if (!gameRunning || gameWin) return;
    const m = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
    if (m[d]) dir = { x: m[d][0], y: m[d][1] };
}

document.querySelectorAll('.dpad-btn').forEach(btn => {
    const d = btn.dataset.dir;
    btn.addEventListener('touchstart', e => { e.preventDefault(); e.stopPropagation(); setDir(d); });
    btn.addEventListener('mousedown', e => { e.preventDefault(); setDir(d); });
});

document.getElementById('restartBtn').addEventListener('click', startFresh);

// ── Draggable d-pad ───────────────────────────────────
const fc = document.getElementById('floatingControls');
let drag = false, dsx, dsy, csx, csy;

fc.addEventListener('mousedown', e => {
    if (e.target.classList.contains('dpad-btn') || e.target.classList.contains('dpad-center')) return;
    drag = true; dsx = e.clientX; dsy = e.clientY;
    const r = fc.getBoundingClientRect(); csx = r.left; csy = r.top;
    e.preventDefault();
});
window.addEventListener('mousemove', e => {
    if (!drag) return;
    fc.style.left = `${csx + e.clientX - dsx}px`; fc.style.top = `${csy + e.clientY - dsy}px`;
    fc.style.right = 'auto'; fc.style.bottom = 'auto';
});
window.addEventListener('mouseup', () => drag = false);

fc.addEventListener('touchstart', e => {
    if (e.target.classList.contains('dpad-btn') || e.target.classList.contains('dpad-center')) return;
    drag = true; const t = e.touches[0]; dsx = t.clientX; dsy = t.clientY;
    const r = fc.getBoundingClientRect(); csx = r.left; csy = r.top;
    e.preventDefault();
}, { passive: false });
window.addEventListener('touchmove', e => {
    if (!drag) return;
    const t = e.touches[0];
    fc.style.left = `${csx + t.clientX - dsx}px`; fc.style.top = `${csy + t.clientY - dsy}px`;
    fc.style.right = 'auto'; fc.style.bottom = 'auto';
}, { passive: false });
window.addEventListener('touchend', () => drag = false);

// ── Swipe on canvas ───────────────────────────────────
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', e => {
    if (!touchStartX) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) {
        setDir(dx > 0 ? 'right' : 'left');
    } else {
        setDir(dy > 0 ? 'down' : 'up');
    }
});

// ── Start ─────────────────────────────────────────────
initGame();
requestAnimationFrame(gameLoop);
</script>
